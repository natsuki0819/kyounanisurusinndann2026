<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Action診断</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-sky-100 via-white to-blue-100 min-h-screen flex items-center justify-center p-5">

<div class="w-full max-w-xl">

    <!-- タイトル -->
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-sky-700">
            🌿 Next Action診断
        </h1>

        <p class="text-gray-600 mt-2">
            今のあなたにぴったりな行動を提案します
        </p>
    </div>

    <!-- カード -->
    <div id="card"
        class="bg-white rounded-3xl shadow-xl p-8 transition-all duration-500">

        <!-- 質問画面 -->
        <div id="questionScreen">

            <!-- 進捗 -->
            <div class="w-full bg-gray-200 rounded-full h-3 mb-6">

                <div id="progressBar"
                    class="bg-sky-500 h-3 rounded-full transition-all duration-500"
                    style="width:33%;">
                </div>

            </div>

            <p id="questionNumber"
                class="text-sm text-gray-500 mb-2">
                Question 1 / 3
            </p>

            <h2 id="questionText"
                class="text-2xl font-bold text-gray-700 mb-8">
            </h2>

            <div id="choices"
                class="grid gap-4">
            </div>

        </div>

        <!-- 結果画面 -->
        <div id="resultScreen" class="hidden">

            <h2 class="text-center text-3xl font-bold text-sky-700 mb-4">
                🎉 今のあなたへの提案
            </h2>

            <div class="bg-sky-50 rounded-2xl p-6 mb-6">

                <p id="resultText"
                    class="text-xl text-center font-semibold text-gray-700 leading-relaxed">
                </p>

            </div>

            <!-- タイマー -->
            <div class="bg-gray-100 rounded-2xl p-6">

                <h3 class="text-xl font-bold text-center mb-4">
                    ⏰ 行動タイマー
                </h3>

                <div class="flex justify-center gap-2 mb-4">

                    <input
                        id="minutesInput"
                        type="number"
                        min="1"
                        value="30"
                        class="border rounded-lg w-24 text-center p-2"
                    >

                    <span class="self-center">
                        分
                    </span>

                </div>

                <div
                    id="timerDisplay"
                    class="text-5xl font-bold text-center text-sky-700 mb-6">

                    30:00

                </div>

                <div
                    class="flex flex-wrap justify-center gap-3">

                    <button
                        id="startBtn"
                        class="bg-sky-500 hover:bg-sky-600 text-white px-6 py-3 rounded-xl">

                        ▶ スタート

                    </button>

                    <button
                        id="pauseBtn"
                        class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-3 rounded-xl">

                        ⏸ 一時停止

                    </button>

                    <button
                        id="resetBtn"
                        class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-xl">

                        ↺ リセット

                    </button>

                </div>

            </div>

            <button
                id="restartBtn"
                class="mt-8 w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl text-lg">

                もう一度診断する

            </button>

        </div>

    </div>
</div>

<script src="app.js"></script>

</body>
</html>
